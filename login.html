<!DOCTYPE html>
<html lang="es">

</head>

<body class="auth-page">

<!-- HEADER -->
<div class="auth-header">
  <img src="CarlsLogo.png" class="logo center">
  <p class="sub">Operado por Cero Tenedor</p>
</div>

<!-- CONTENIDO -->
<div class="auth-container">
  <div class="auth-card">
    <h2>Acceso</h2>

    <input id="email" placeholder="Correo electrónico">
    <input id="password" type="password" placeholder="Contraseña">

    <div class="auth-options">
      <label><input type="checkbox"> Recordarme</label>
      <span class="link">¿Olvidaste tu contraseña?</span>
    </div>

    <button onclick="login()">Entrar</button>
    <button class="secondary" onclick="irRegistro()">Registrarse</button>

    <p class="security">
      Acceso exclusivo para personal autorizado<br>
      Uso interno únicamente
    </p>
  </div>
</div>

<footer>
  © 2026 Cero Tenedor, AGRUPACION RINCON MORALES S de RL de CV <br>
  Plataforma interna de capacitación.
</footer>

<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
